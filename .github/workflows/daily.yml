name: Daily Trending Report

on:
  schedule:
    # Run daily at 08:27 UTC (off-peak, avoids :00/:30 contention)
    - cron: "27 8 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        run: python -m src.main --all-languages --output GH-TRENDING-REPORT.md

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GH-TRENDING-REPORT.md data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update trending report — $(date -u +%Y-%m-%d)"
            git push
          fi
